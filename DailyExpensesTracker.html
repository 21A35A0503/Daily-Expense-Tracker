<!DOCTYPE html>
<html>
    <head><title>Smart Expenses Tracker</title>
    <link rel="stylesheet" href="DailyExpensesTracker.css">
    </head>
    <body>
        <h1>Smart Daily Expenses Tracker</h1>
        <div class="card">
            <div class="total-cards">
                <h3>Total Expenses</h3>
                <p id="totalexpense">₹0</p>
            </div>
            <div class="total-cards">
                <h3> Total Transactions</h3>
                <p id="totaltransactions">₹0</p>
            </div>
            <div class="total-cards">
                <h3>Highest Expenses</h3>
                <p id="highestexpense">₹0</p>
            </div>
        </div>
        <div class="table-container">
            <div class="add-expense">
                <form id="expense-form">
                    <input type="text" id="title" placeholder="Title" required>
                    <input type="number" id="amount" placeholder="Amount" required>
                    <select id="category">
                        <option value="All">Select</option>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Health">Health</option>
                        <option value="House Allowance">House Allowance</option>
                    </select>
                    <button type="submit">Add Expense</button>
                </form>
            </div>
        </div>
         <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expense-table"></tbody>
            <div class="filter-container">
                <select id="filter">
                    <option value="All Categories">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Health">Health</option>
                    <option value="House Allowance">House Allowance</option>
                </select>
            </div>
            <script>
                const expenseForm=document.getElementById("expense-form");
                let expenses =JSON.parse(localStorage.getItem("expenses"))||[];
                if(expenses.length===0){
                fetch("expenses.json")
                .then((response)=>{
                    return response.json();
                })
                .then((data)=>{
                    expenses=data;
                    saveToLocalStorage();
                    displayExpenses(expenses);
                    updateTable();
                })
                .catch((error)=>{
                    console.log("error",error);
                });
                }
                else{
                    displayExpenses(expenses);
                    updateTable();
                }
                function displayExpenses(expenses){
                    const table = document.getElementById("expense-table");
                    table.innerHTML="";
                    expenses.forEach((expense)=>{
                        table.innerHTML+=`
                        <tr>
                        <td>${expense.id}</td>
                        <td>${expense.title}</td>
                        <td>${expense.category}</td>
                        <td>${expense.amount}</td>
                        <td><button class="deletebutton" onclick="deleteExpense(${expense.id})">Delete</button></td>
                        </tr>
                        `;
                    });
                }
                function updateTable(){
                    const total=expenses.reduce((sum,expense)=>{
                        return sum+expense.amount;
                    },0);
                    const highest = expenses.reduce((max, expense) => {
                        return expense.amount > max ? expense.amount : max;
                    }, 0);
                    document.getElementById("totalexpense").innerText = `₹${total}`;
                    document.getElementById("totaltransactions").innerText = expenses.length;
                    document.getElementById("highestexpense").innerText = `₹${highest}`;
                }
                const filterSelect=document.getElementById("filter");
                filterSelect.addEventListener("change",filter);
                function filter(){
                    const selected=filterSelect.value;
                    let filterExpenses=expenses;
                    if(selected!=="All"){
                        filterExpenses=expenses.filter(expense=>{
                            return expense.category===selected;
                        });
                    }
                    displayExpenses(filterExpenses);
                }
                expenseForm.addEventListener("add",addExpense);
                function addExpense(event){
                    event.preventDefault();
                    const title =document.getElementById("title").value;
                    const category =document.getElementById("category").value;
                    const amount = Number(document.getElementById("amount").value);
                    const expense = {    
                        id: Date.now(),
                        title,
                        category,
                        amount
                    };
                    expenses.push(expense);
                    saveToLocalStorage();
                    displayExpenses(expenses);
                    updateTable();
                    expenseForm.reset();
                }
                function deleteExpense(id){
                    expenses = expenses.filter((expense) => {
                        return expense.id !== id;
                    });
                    saveToLocalStorage();
                    displayExpenses(expenses);
                    updateTable();
                }
                function saveToLocalStorage(){
                    localStorage.setItem("expenses",JSON.stringify(expenses));
                }
            </script>
        </table>
        </div>
    </body>
</html>
